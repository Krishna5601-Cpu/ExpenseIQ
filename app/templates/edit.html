{% extends "base.html" %} {% block title %}Edit Expense{% endblock %} {% block
content %}

<section class="max-w-3xl mx-auto">
  <!-- Header -->

  <div
    class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-3xl p-8 text-white shadow-lg mb-8"
  >
    <p class="uppercase tracking-widest text-sm text-blue-100">
      Expense Management
    </p>

    <h1 class="text-4xl font-bold mt-2">Edit Expense</h1>

    <p class="mt-3 text-blue-100">
      Update your expense details and keep your records accurate.
    </p>
  </div>

  <!-- Form Card -->

  <div class="bg-white rounded-3xl shadow-lg p-8">
    <form
      action="{{ url_for('expense.update_expense', expense_id=expense.id) }}"
      method="POST"
      class="space-y-6"
    >
      <!-- Amount -->

      <div>
        <label for="amount" class="block mb-2 font-semibold text-gray-700">
          Amount
        </label>

        <input
          id="amount"
          name="amount"
          type="number"
          value="{{ expense.amount }}"
          required
          class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <!-- Category -->

      <div>
        <label for="category" class="block mb-2 font-semibold text-gray-700">
          Category
        </label>

        <select
          id="category"
          name="category"
          required
          class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
          {% set categories = [ "food", "travel", "shopping", "health", "bills",
          "entertainment" ] %} {% for category in categories %}

          <option
            value="{{ category }}"
            {%
            if
            expense.category|lower=""
            ="category"
            %}
            selected
            {%
            endif
            %}
          >
            {{ category.title() }}
          </option>

          {% endfor %}
        </select>
      </div>

      <!-- Description -->

      <div>
        <label for="description" class="block mb-2 font-semibold text-gray-700">
          Description
        </label>

        <textarea
          id="description"
          name="description"
          rows="4"
          class="w-full rounded-xl border border-gray-300 px-4 py-3 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
{{ expense.description }}</textarea
        >
      </div>

      <!-- Date -->

      <div>
        <label for="date" class="block mb-2 font-semibold text-gray-700">
          Date
        </label>

        <input
          id="date"
          name="date"
          type="date"
          value="{{ expense.date }}"
          required
          class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <!-- Buttons -->

      <div class="flex flex-col sm:flex-row gap-4 pt-4">
        <button
          type="submit"
          class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold transition"
        >
          💾 Save Changes
        </button>

        <a
          href="{{ url_for('main.home') }}"
          class="flex-1 text-center border border-gray-300 hover:bg-gray-100 py-3 rounded-xl font-semibold transition"
        >
          Cancel
        </a>
      </div>
    </form>
  </div>
</section>

{% endblock %}
