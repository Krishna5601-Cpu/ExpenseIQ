{% extends "base.html" %} {% block title %}Edit Expense{% endblock %} {% block
content %}

<section class="mx-auto max-w-2xl">
  <!-- Header -->

  <div
    class="mb-8 rounded-3xl bg-gradient-to-r from-indigo-600 to-blue-600 p-8 text-white shadow-lg"
  >
    <p class="text-sm uppercase tracking-wider opacity-80">
      Expense Management
    </p>

    <h1 class="mt-2 text-4xl font-bold">Edit Expense</h1>

    <p class="mt-3 text-white/80">
      Update your expense details and keep your records accurate.
    </p>
  </div>

  <!-- Form Card -->

  <div class="rounded-3xl bg-white p-8 shadow dark:bg-slate-900">
    <form
      action="{{ url_for('expense.update_expense', expense_id=expense.id) }}"
      method="POST"
      class="space-y-6"
    >
      <!-- Amount -->

      <div>
        <label for="amount" class="mb-2 block font-medium"> Amount </label>

        <input
          id="amount"
          type="number"
          name="amount"
          value="{{ expense.amount }}"
          required
          class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:ring-2 focus:ring-indigo-500 dark:border-slate-700 dark:bg-slate-800"
        />
      </div>

      <!-- Category -->

      <div>
        <label for="category" class="mb-2 block font-medium"> Category </label>

        <input
          id="category"
          type="text"
          name="category"
          value="{{ expense.category }}"
          required
          class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:ring-2 focus:ring-indigo-500 dark:border-slate-700 dark:bg-slate-800"
        />
      </div>

      <!-- Description -->

      <div>
        <label for="description" class="mb-2 block font-medium">
          Description
        </label>

        <textarea
          id="description"
          name="description"
          rows="4"
          class="w-full resize-none rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:ring-2 focus:ring-indigo-500 dark:border-slate-700 dark:bg-slate-800"
        >
{{ expense.description }}</textarea
        >
      </div>

      <!-- Date -->

      <div>
        <label for="date" class="mb-2 block font-medium"> Date </label>

        <input
          id="date"
          type="date"
          name="date"
          value="{{ expense.date }}"
          required
          class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:ring-2 focus:ring-indigo-500 dark:border-slate-700 dark:bg-slate-800"
        />
      </div>

      <!-- Buttons -->

      <div class="flex flex-col gap-4 sm:flex-row">
        <button
          type="submit"
          class="flex-1 rounded-2xl bg-indigo-600 py-3 font-semibold text-white transition hover:bg-indigo-700"
        >
          💾 Save Changes
        </button>

        <a
          href="{{ url_for('main.home') }}"
          class="flex-1 rounded-2xl border border-slate-300 py-3 text-center font-semibold transition hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800"
        >
          Cancel
        </a>
      </div>
    </form>
  </div>
</section>

{% endblock %}
