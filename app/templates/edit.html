<!doctype html>
<html>
  <head>
    <title>Edit Expense</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-10">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow">
      <h1 class="text-2xl font-bold mb-4">✏️ Edit Expense</h1>

      <form action="/update/{{ expense.id }}" method="POST" class="space-y-4">
        <input
          type="number"
          name="amount"
          value="{{ expense.amount }}"
          class="w-full p-2 border rounded"
          required
        />

        <input
          type="text"
          name="category"
          value="{{ expense.category }}"
          class="w-full p-2 border rounded"
          required
        />

        <input
          type="text"
          name="description"
          value="{{ expense.description }}"
          class="w-full p-2 border rounded"
        />

        <input
          type="date"
          name="date"
          value="{{ expense.date }}"
          class="w-full p-2 border rounded"
        />

        <button
          type="submit"
          class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600"
        >
          Update Expense
        </button>
      </form>
    </div>
  </body>
</html>
