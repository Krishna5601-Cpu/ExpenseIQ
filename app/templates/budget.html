<!doctype html>
<html>
  <head>
    <title>Set Budget</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-10">
    <a href="/" class="text-blue-500 underline mb-4 block"> ⬅ Back to Home </a>
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow">
      <h1 class="text-2xl font-bold mb-4">💰 Set Budgets</h1>

      <form action="/save-budget" method="POST" class="space-y-4">
        <!-- Overall -->
        <div>
          <label class="block font-semibold">Overall Budget</label>
          <input
            type="number"
            name="overall"
            value="{{ budgets.overall }}"
            class="w-full p-2 border rounded"
          />
        </div>

        <!-- Category Budgets -->
        <div>
          <label class="block font-semibold">Food Budget</label>
          <input
            type="number"
            name="food"
            value="{{ budgets.categories.get('food', 0) }}"
            class="w-full p-2 border rounded"
          />
        </div>

        <div>
          <label class="block font-semibold">Travel Budget</label>
          <input
            type="number"
            name="travel"
            value="{{ budgets.categories.get('travel', 0) }}"
            class="w-full p-2 border rounded"
          />
        </div>

        <div>
          <label class="block font-semibold">Bills Budget</label>
          <input
            type="number"
            name="bills"
            value="{{ budgets.categories.bills or 0 }}"
            class="w-full p-2 border rounded"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600"
        >
          Save Budget
        </button>
      </form>
      <div class="mt-6">
        <h2 class="text-xl font-semibold mb-2">📊 Current Budgets</h2>

        <p><strong>Overall:</strong> ₹{{ budgets.overall }}</p>

        <ul class="mt-2">
          {% for cat, amt in budgets.categories.items() %}
          <li>{{ cat.title() }}: ₹{{ amt }}</li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </body>
</html>
