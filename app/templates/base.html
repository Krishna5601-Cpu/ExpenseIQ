<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}ExpenseIQ{% endblock %}</title>

    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='favicon.png') }}"
    />

    <script>
      tailwind = {
        config: {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                primary: "#4f46e5",
              },
            },
          },
        },
      };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>

    {% block head %}{% endblock %}
  </head>

  <body
    class="min-h-screen bg-slate-100 text-slate-800 transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100"
  >
    {% include "components/navbar.html" %}

    <main class="max-w-7xl mx-auto px-4 py-8">
      {% block content %}{% endblock %}
    </main>

    <footer
      class="mt-12 border-t border-slate-200 bg-white transition-colors duration-300 dark:border-slate-700 dark:bg-slate-800"
    >
      <div
        class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-3 px-4 py-6"
      >
        <div>
          <h3 class="text-lg font-bold text-indigo-600">ExpenseIQ</h3>

          <p class="text-sm text-slate-500 dark:text-slate-400">
            AI Powered Expense Tracker
          </p>
        </div>

        <p class="text-sm text-slate-500 dark:text-slate-400">
          © 2026 ExpenseIQ
        </p>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='scripts.js') }}" defer></script>

    {% block scripts %}{% endblock %}
  </body>
</html>
