<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}ExpenseIQ{% endblock %}</title>

    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='favicon.png') }}"
    />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#4f46e5",
            },
          },
        },
      };
    </script>

    {% block head %}{% endblock %}
  </head>

  <body
    class="bg-slate-100 min-h-screen text-slate-800 transition-colors duration-300"
  >
    {% include "components/navbar.html" %}

    <main class="max-w-7xl mx-auto px-4 py-8">
      {% block content %}{% endblock %}
    </main>

    <footer class="mt-12 border-t bg-white">
      <div
        class="max-w-7xl mx-auto px-4 py-6 flex flex-col md:flex-row justify-between items-center gap-2"
      >
        <div>
          <h3 class="font-bold text-lg">ExpenseIQ</h3>

          <p class="text-gray-500 text-sm">AI Powered Expense Tracker</p>
        </div>

        <div class="text-sm text-gray-500">© 2026 ExpenseIQ</div>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='scripts.js') }}" defer></script>

    {% block scripts %}{% endblock %}
  </body>
</html>
