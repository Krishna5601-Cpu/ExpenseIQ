<!doctype html>
<html>
  <head>
    <title>ExpenseIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-10">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow">
      <h1 class="text-2xl font-bold mb-4">💰 ExpenseIQ</h1>

      <form action="/add-expense" method="POST" class="space-y-4">
        <input
          type="number"
          name="amount"
          placeholder="Amount"
          class="w-full p-2 border rounded"
          required
        />

        <input
          type="text"
          name="category"
          placeholder="Category"
          class="w-full p-2 border rounded"
          required
        />

        <input
          type="text"
          name="description"
          placeholder="Description"
          class="w-full p-2 border rounded"
        />

        <input type="date" name="date" class="w-full p-2 border rounded" />

        <button
          type="submit"
          class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600"
        >
          Add Expense
        </button>
      </form>
    </div>

    <!-- Expense Table -->
    <div class="max-w-4xl mx-auto mt-10 bg-white p-6 rounded-lg shadow">
      <h2 class="text-xl font-semibold mb-4">📊 All Expenses</h2>

      {% if expenses %}
      <table class="w-full border-collapse">
        <thead>
          <tr class="text-center border-t hover:bg-gray-100 transition">
            <th class="p-2">Amount</th>
            <th class="p-2">Category</th>
            <th class="p-2">Description</th>
            <th class="p-2">Date</th>
            <th class="p-2">Action</th>
          </tr>
        </thead>

        <tbody>
          {% for expense in expenses %}
          <tr class="text-center border-t hover:bg-gray-100 transition">
            <td class="p-2">₹{{ expense.amount }}</td>
            <td class="p-2">{{ expense.category }}</td>
            <td class="p-2">{{ expense.description }}</td>
            <td class="p-2">{{ expense.date }}</td>
            <td class="p-2 space-x-2">
              <a
                href="/edit/{{ expense.id }}"
                class="text-blue-500 hover:underline"
              >
                Edit
              </a>

              <a
                href="/delete/{{ expense.id }}"
                class="text-red-500 hover:underline"
                onclick="return confirm('Are you sure?');"
              >
                Delete
              </a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      {% else %}
      <p class="text-gray-500">No expenses yet</p>
      {% endif %}
    </div>
  </body>
</html>
