<!doctype html>
<html>
  <head>
    <title>Set Budget</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-10">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow">
      <h1 class="text-2xl font-bold mb-4">💰 Set Budgets</h1>

      <form action="/save-budget" method="POST" class="space-y-4">
        <!-- Overall -->
        <div>
          <label class="block font-semibold">Overall Budget</label>
          <input
            type="number"
            name="overall"
            value="{{ budgets.overall }}"
            class="w-full p-2 border rounded"
          />
        </div>

        <!-- Category Budgets -->
        <div>
          <label class="block font-semibold">Food Budget</label>
          <input
            type="number"
            name="food"
            value="{{ budgets.categories.food or 0 }}"
            class="w-full p-2 border rounded"
          />
        </div>

        <div>
          <label class="block font-semibold">Travel Budget</label>
          <input
            type="number"
            name="travel"
            value="{{ budgets.categories.travel or 0 }}"
            class="w-full p-2 border rounded"
          />
        </div>

        <div>
          <label class="block font-semibold">Bills Budget</label>
          <input
            type="number"
            name="bills"
            value="{{ budgets.categories.bills or 0 }}"
            class="w-full p-2 border rounded"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600"
        >
          Save Budget
        </button>
      </form>
    </div>
  </body>
</html>
